spring:
  application:
    name: rpg-api
  datasource:
    url: jdbc:postgresql://localhost:5432/rpg
    username: rpg
    password: rpg
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
